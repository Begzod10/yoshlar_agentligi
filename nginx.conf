# Nginx Server Configuration for yoshlar_agentligi
# Place this file or symlink it to: /etc/nginx/sites-available/agency.gennis.uz
# Then run: ln -s /etc/nginx/sites-available/agency.gennis.uz /etc/nginx/sites-enabled/
# And test with: nginx -t && systemctl reload nginx

# 1. HTTP Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name agency.gennis.uz;

    # Certbot / Let's Encrypt validation path
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name agency.gennis.uz;

    # Client body size limits (essential for media uploads)
    client_max_body_size 50M;

    # SSL Certificates Configuration (using Let's Encrypt standard paths)
    ssl_certificate /etc/letsencrypt/live/agency.gennis.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agency.gennis.uz/privkey.pem;

    # Secure SSL Protocols and Ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # SSL Session cache
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS (Highly Recommended for Production)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Log files
    access_log /var/log/nginx/agency_gennis_access.log;
    error_log /var/log/nginx/agency_gennis_error.log warn;

    # 3. Static Media Files Location
    location /media/ {
        # Path where uploaded backend media is stored
        alias /var/www/yoshlar_agentligi/backend/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri $uri/ =404;
    }

    # 4. Backend Routing (FastAPI)
    # Routes /api, /docs, /openapi.json, and /healthz to the backend on port 8001
    location ~ ^/(api|docs|openapi.json|healthz) {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Real IP forwarding headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keepalive timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 5. Frontend Routing (Next.js)
    # Reverse proxy for the Next.js server running on port 3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Real IP forwarding headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js specific optimizations
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}
