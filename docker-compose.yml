services:
  postgres:
    image: postgres:16-alpine
    container_name: yoshlar-postgres
    environment:
      POSTGRES_USER: yoshlar
      POSTGRES_PASSWORD: yoshlar
      POSTGRES_DB: yoshlar
    ports:
      - "5544:5432"
    volumes:
      - yoshlar_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yoshlar -d yoshlar"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres_test:
    image: postgres:16-alpine
    container_name: yoshlar-postgres-test
    environment:
      POSTGRES_USER: yoshlar
      POSTGRES_PASSWORD: yoshlar
      POSTGRES_DB: yoshlar_test
    ports:
      - "5545:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yoshlar -d yoshlar_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: yoshlar-redis
    ports:
      - "6479:6379"
    volumes:
      - yoshlar_redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yoshlar-backend
    restart: always
    environment:
      - APP_ENV=production
      - APP_NAME=Yoshlar Backend
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DATABASE_URL=postgresql+asyncpg://yoshlar:yoshlar@postgres:5432/yoshlar
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=production-secret-must-be-changed-in-prod-32-chars
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TTL_MIN=30
      - JWT_REFRESH_TTL_DAYS=14
      - CORS_ORIGINS=https://agency.gennis.uz
      - LOG_LEVEL=INFO
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/media:/app/media

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yoshlar-frontend
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  yoshlar_pg:
  yoshlar_redis:
